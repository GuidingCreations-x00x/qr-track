  <text x="12" y="22" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="14" fill="#1a1a2e">T</text>
  <text x="12" y="46" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="32" fill="#ffffff">L</text>
  <!-- Brand text -->
  <text x="66" y="26" font-family="Arial,Helvetica,sans-serif" font-weight="300" font-size="12" fill="#888" letter-spacing="2">TRACKING</text>
  <text x="66" y="48" font-family="Arial,Helvetica,sans-serif" font-size="22" fill="#e0e0e0" letter-spacing="1">
